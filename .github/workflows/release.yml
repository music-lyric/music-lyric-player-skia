name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    uses: ./.github/workflows/release-windows.yml

  release:
    needs: [windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List Assets
        shell: bash
        run: ls -R dist

      - name: Build Notes
        shell: bash
        run: python3 script/change-log/build.py --current

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          body_path: CURRENT_CHANGELOG.md
          prerelease: false
          fail_on_unmatched_files: true
